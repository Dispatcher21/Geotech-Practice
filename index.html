<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geotech FE Practice Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e12;
  --surface: #13161c;
  --surface2: #1c2029;
  --border: #2a2f3a;
  --border2: #3a414f;
  --text: #dde3ee;
  --muted: #7a8497;
  --accent: #e8a020;
  --accent-dim: rgba(232,160,32,0.12);
  --green: #3ecf6a;
  --green-dim: rgba(62,207,106,0.10);
  --red: #f05050;
  --red-dim: rgba(240,80,80,0.10);
  --blue: #4c9fe0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px;
  line-height: 1.65;
  min-height: 100vh;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── sidebar layout ── */
.page-shell {
  display: flex;
  flex: 1;
  min-height: 0;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,160,32,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,160,32,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ─── Sticky Score Bar ─── */
.score-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(12,14,18,0.90);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.score-label {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 1px;
}
.score-right {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.progress-track {
  width: 180px;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0;
  transition: width 0.35s ease;
}

/* ─── Layout ─── */
.wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 44px 24px 80px;
  position: relative;
  z-index: 1;
}

/* ─── Header ─── */
header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 28px;
  margin-bottom: 8px;
}
.eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
header h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.4px;
  color: #eef2ff;
}
.header-meta {
  margin-top: 10px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

/* ─── Section divider ─── */
.section-head {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 44px 0 18px;
}
.section-head span {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  white-space: nowrap;
}
.section-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── Question card ─── */
.qcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 14px;
  transition: border-color 0.2s, background 0.2s;
}
.qcard:hover { border-color: var(--border2); }
.qcard.state-correct { border-color: var(--green); background: var(--green-dim); }
.qcard.state-wrong   { border-color: var(--red);   background: var(--red-dim); }

.q-top {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.q-num {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 3px 8px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.q-body { flex: 1; font-size: 14.5px; }

/* ─── Image placeholder ─── */
.fig-placeholder {
  background: var(--surface2);
  border: 1.5px dashed var(--border2);
  border-radius: 6px;
  padding: 18px;
  margin: 12px 0;
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
.fig-placeholder .fig-title {
  color: var(--accent);
  letter-spacing: 0.5px;
}
.fig-placeholder img {
  max-width: 100%;
  border-radius: 4px;
  display: none; /* shown by JS once src set */
}
.fig-placeholder .fig-note {
  font-size: 10px;
  color: #444c5a;
}

/* ─── Options ─── */
.options {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-top: 14px;
}
.opt {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--text);
  text-align: left;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  width: 100%;
}
.opt:hover:not(:disabled) {
  background: #242836;
  border-color: var(--accent);
}
.opt:disabled { cursor: default; }
.opt .ltr {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-width: 18px;
  flex-shrink: 0;
}
.opt.opt-correct { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.opt.opt-correct .ltr { color: var(--green); }
.opt.opt-wrong   { background: var(--red-dim);   border-color: var(--red);   color: var(--red); }
.opt.opt-wrong   .ltr { color: var(--red); }
.opt.opt-reveal  { border-color: var(--green); opacity: 0.55; }

/* ─── Explanation ─── */
.explanation {
  margin-top: 14px;
  padding: 13px 15px;
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: var(--muted);
  display: none;
  line-height: 1.6;
}
.explanation.visible { display: block; }
.explanation b { color: var(--accent); font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; letter-spacing: 1px; display: block; margin-bottom: 6px; }

/* ─── SVG profile ─── */
.profile-wrap {
  margin: 12px 0;
  background: var(--surface2);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}

/* ─── Result banner ─── */
.result {
  margin-top: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 32px 24px;
  text-align: center;
  display: none;
}
.result.visible { display: block; }
.result-num {
  font-family: 'Space Mono', monospace;
  font-size: 52px;
  color: var(--accent);
  font-weight: 700;
  line-height: 1;
}
.result-sub {
  color: var(--muted);
  font-size: 13px;
  margin-top: 8px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 1px;
}
.reset-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 1.5px;
  padding: 10px 28px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
}
.reset-btn:hover { background: var(--accent); color: var(--bg); }

/* image-needed badge */
.need-crop {
  display: inline-block;
  background: rgba(232,160,32,0.15);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
}

/* ─── Sidebar ─── */
.sidebar {
  width: 50vw;
  min-width: 36px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  z-index: 100;
  flex-shrink: 0;
  user-select: none;
}
.sidebar.collapsed {
  width: 36px !important;
  min-width: 36px;
}
.sidebar.transitioning {
  transition: width 0.25s cubic-bezier(.4,0,.2,1);
}

/* drag handle */
.resize-handle {
  position: absolute;
  right: -4px;
  top: 0;
  width: 8px;
  height: 100%;
  cursor: col-resize;
  z-index: 200;
  background: transparent;
  transition: background 0.15s;
}
.resize-handle:hover,
.resize-handle.dragging {
  background: var(--accent);
  opacity: 0.5;
}
.sidebar.collapsed .resize-handle {
  display: none;
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 10px 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
}
.sidebar-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  opacity: 1;
  transition: opacity 0.2s;
}
.sidebar.collapsed .sidebar-title { opacity: 0; }
.sidebar-toggle {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--muted);
  border-radius: 5px;
  width: 22px;
  height: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  transition: color 0.15s, border-color 0.15s;
  padding: 0;
}
.sidebar-toggle:hover { color: var(--accent); border-color: var(--accent); }
.sidebar iframe {
  flex: 1;
  border: none;
  width: 100%;
  background: #fff;
  opacity: 1;
  transition: opacity 0.2s;
}
.sidebar.collapsed iframe { opacity: 0; pointer-events: none; }

/* main area takes remaining space */
.main-col {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  position: relative;
}


/* ─── Mobile: bottom panel ─── */
@media (max-width: 768px) {
  .page-shell {
    flex-direction: column;
  }
  .sidebar {
    width: 100% !important;
    min-width: 100%;
    height: 50vh;
    min-height: 36px;
    border-right: none;
    border-top: 1px solid var(--border);
    position: sticky;
    bottom: 0;
    top: auto;
    order: 2;
    flex-direction: column;
  }
  .sidebar.collapsed {
    height: 36px !important;
    width: 100% !important;
  }
  .sidebar.transitioning {
    transition: height 0.25s cubic-bezier(.4,0,.2,1) !important;
  }
  .main-col {
    order: 1;
    overflow-y: unset;
  }
  /* resize handle becomes top edge on mobile */
  .resize-handle {
    right: auto;
    left: 0;
    top: -4px;
    width: 100%;
    height: 8px;
    cursor: row-resize;
  }
  .sidebar.collapsed .resize-handle {
    display: none;
  }
  /* rotate toggle arrow for vertical direction */
  .sidebar-toggle {
    transform: rotate(90deg);
  }
  .sidebar iframe {
    width: 100%;
    height: 100%;
  }
}

</style>
</head>
<body>
<div class="page-shell">
<div class="sidebar" id="sidebar">
  <div class="resize-handle" id="resize-handle"></div>
  <div class="sidebar-header">
    <span class="sidebar-title">EQ SHEET</span>
    <button class="sidebar-toggle" id="sb-toggle" title="Toggle panel">◀</button>
  </div>
  <iframe id="eq-frame" src="Geotech-Eq-Sheet.pdf" type="application/pdf"></iframe>
</div>
<div class="main-col">
<div class="score-bar">
  <span class="score-label" id="score-disp">SCORE: — / —</span>
  <div class="score-right">
    <span id="prog-text">0 / 27 answered</span>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="eyebrow">FE Civil Exam Prep</div>
    <h1>Geotechnical Engineering Practice Quiz</h1>
    <div class="header-meta">
      <span>27 QUESTIONS</span>
      <span>PHASE RELATIONS · CLASSIFICATION · SEEPAGE · SHEAR STRENGTH · CONSOLIDATION</span>
    </div>
  </header>

  <div id="quiz"></div>

  <div class="result" id="result">
    <div class="result-num" id="final-score">0/27</div>
    <div class="result-sub">QUESTIONS CORRECT</div>
    <br>
    <button class="reset-btn" onclick="reset()">↺ &nbsp;RESET QUIZ</button>
  </div>
</div>

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('quiz');
  root.innerHTML = '';
  let lastSec = null;

  questions.forEach(q => {
    if (q.section && q.section !== lastSec) {
      const sh = document.createElement('div');
      sh.className = 'section-head';
      sh.innerHTML = `<span>${q.section}</span>`;
      root.appendChild(sh);
      lastSec = q.section;
    }

    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = `q${q.id}`;

    // figure
    let figHTML = '';
    if (q.fig) {
      const src = IMAGES[q.fig.key] || '';
      const hasImg = src.length > 0;
      figHTML = `<div class="fig-placeholder" id="fp-${q.fig.key}">
        ${hasImg
          ? `<img src="${src}" alt="${q.fig.title}" style="display:block;">`
          : `<span class="fig-title">📊 ${q.fig.title} <span class="need-crop">IMAGE NEEDED</span></span>
             <span class="fig-note">${q.fig.note}</span>`
        }
      </div>`;
    }
    if (q.svgProfile) {
      figHTML = soilProfileSVG();
    }

    const optsHTML = q.opts.map((o, i) =>
      `<button class="opt" onclick="pick(${q.id},${i})" id="opt-${q.id}-${i}">
        <span class="ltr">${LTRS[i]}.</span><span>${o}</span>
      </button>`
    ).join('');

    card.innerHTML = `
      <div class="q-top">
        <span class="q-num">Q${q.id}</span>
        <span class="q-body">${q.text}</span>
      </div>
      ${figHTML}
      <div class="options">${optsHTML}</div>
      <div class="explanation" id="exp${q.id}"><b>SOLUTION</b>${q.exp}</div>`;

    root.appendChild(card);
  });
}

function pick(qId, sel) {
  const q = questions.find(x => x.id === qId);
  if (!q) return;
  // disable all
  LTRS.forEach((_, i) => {
    const b = document.getElementById(`opt-${qId}-${i}`);
    if (b) b.disabled = true;
  });
  const card = document.getElementById(`q${qId}`);
  const selBtn = document.getElementById(`opt-${qId}-${sel}`);
  const corrBtn = document.getElementById(`opt-${qId}-${q.ans}`);

  if (sel === q.ans) {
    selBtn.classList.add('opt-correct');
    card.classList.add('state-correct');
    score++;
  } else {
    selBtn.classList.add('opt-wrong');
    corrBtn.classList.add('opt-reveal');
    card.classList.add('state-wrong');
  }
  document.getElementById(`exp${qId}`).classList.add('visible');
  answered++;
  updateUI();
  if (answered === TOTAL) showResult();
}

function updateUI() {
  document.getElementById('score-disp').textContent = `SCORE: ${score} / ${answered}`;
  document.getElementById('prog-text').textContent = `${answered} / ${TOTAL} answered`;
  document.getElementById('prog-fill').style.width = `${(answered/TOTAL)*100}%`;
}

function showResult() {
  const r = document.getElementById('result');
  document.getElementById('final-score').textContent = `${score}/${TOTAL}`;
  r.classList.add('visible');
  setTimeout(() => r.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
}

function reset() {
  score = 0; answered = 0;
  document.getElementById('result').classList.remove('visible');
  updateUI();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
updateUI();
</script>

<script>
const sb = document.getElementById("sidebar");
const sbt = document.getElementById("sb-toggle");
const handle = document.getElementById("resize-handle");
const frame = document.getElementById("eq-frame");

const isMobile = () => window.innerWidth <= 768;

let prevWidth  = window.innerWidth * 0.5;
let prevHeight = window.innerHeight * 0.5;

function updateToggleArrows() {
  if (isMobile()) {
    sbt.textContent = sb.classList.contains("collapsed") ? "▲" : "▼";
  } else {
    sbt.textContent = sb.classList.contains("collapsed") ? "▶" : "◀";
  }
}

// Toggle collapse
sbt.addEventListener("click", () => {
  sb.classList.add("transitioning");
  setTimeout(() => sb.classList.remove("transitioning"), 280);
  if (sb.classList.contains("collapsed")) {
    sb.classList.remove("collapsed");
    if (isMobile()) {
      sb.style.height = prevHeight + "px";
      sb.style.width  = "";
    } else {
      sb.style.width  = prevWidth + "px";
      sb.style.height = "";
    }
  } else {
    if (isMobile()) prevHeight = sb.offsetHeight;
    else            prevWidth  = sb.offsetWidth;
    sb.classList.add("collapsed");
  }
  updateToggleArrows();
});

// Re-sync arrows on resize
window.addEventListener("resize", updateToggleArrows);
updateToggleArrows();

// ── Mouse drag ──────────────────────────────────────────
let dragging = false;
let startX, startY, startW, startH;

handle.addEventListener("mousedown", e => {
  if (sb.classList.contains("collapsed")) return;
  dragging = true;
  startX = e.clientX;
  startY = e.clientY;
  startW = sb.offsetWidth;
  startH = sb.offsetHeight;
  handle.classList.add("dragging");
  document.body.style.userSelect = "none";
  frame.style.pointerEvents = "none";
  document.body.style.cursor = isMobile() ? "row-resize" : "col-resize";
  e.preventDefault();
});

document.addEventListener("mousemove", e => {
  if (!dragging) return;
  if (isMobile()) {
    const dy = startY - e.clientY;           // dragging up = bigger panel
    const newH = Math.max(80, Math.min(window.innerHeight * 0.85, startH + dy));
    sb.style.height = newH + "px";
    prevHeight = newH;
  } else {
    const dx = e.clientX - startX;
    const newW = Math.max(200, Math.min(window.innerWidth * 0.85, startW + dx));
    sb.style.width = newW + "px";
    prevWidth = newW;
  }
});

document.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;
  handle.classList.remove("dragging");
  document.body.style.cursor = "";
  document.body.style.userSelect = "";
  frame.style.pointerEvents = "";
});

// ── Touch drag (mobile) ─────────────────────────────────
let touchDragging = false;
let touchStartY, touchStartH;

handle.addEventListener("touchstart", e => {
  if (sb.classList.contains("collapsed")) return;
  touchDragging = true;
  touchStartY = e.touches[0].clientY;
  touchStartH = sb.offsetHeight;
  frame.style.pointerEvents = "none";
  e.preventDefault();
}, { passive: false });

document.addEventListener("touchmove", e => {
  if (!touchDragging) return;
  const dy = touchStartY - e.touches[0].clientY;
  const newH = Math.max(80, Math.min(window.innerHeight * 0.85, touchStartH + dy));
  sb.style.height = newH + "px";
  prevHeight = newH;
  e.preventDefault();
}, { passive: false });

document.addEventListener("touchend", () => {
  if (!touchDragging) return;
  touchDragging = false;
  frame.style.pointerEvents = "";
});
</script>
</body>
</html>
